<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Be More Amy — Baton Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    :root{
      --bg:#0b0b0b; --text:#f2f2f2; --muted:#b7b7b7; --panel:rgba(18,18,18,.94);
      --border:rgba(255,255,255,.10); --orange:#ff7a00; --bmaHeader:#FAEBC8;
      --safeTop: env(safe-area-inset-top); --safeBottom: env(safe-area-inset-bottom);
      --trackerHeaderH: 132px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    .sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
    .topbar{position:sticky;top:0;z-index:1000;padding:calc(10px + var(--safeTop)) 14px 10px;background:var(--bmaHeader);border-bottom:1px solid rgba(0,0,0,.10)}
    .topbar-row{position:relative;height:var(--trackerHeaderH);display:flex;align-items:center;justify-content:center;padding-bottom:6px}
    .menu-wrap{position:absolute;left:0;top:calc(50% - 18px);transform:translateY(-50%);z-index:1200}
    .menu-button{appearance:none;border:none;background:transparent;padding:10px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
    .menu-button:focus{outline:2px solid rgba(0,0,0,.30);outline-offset:3px;border-radius:10px}
    .menu-dropdown{position:absolute;left:0;top:calc(100% + 8px);min-width:210px;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,.18);padding:8px;display:none}
    .menu-dropdown.open{display:block}.menu-dropdown a{display:block;padding:10px 12px;border-radius:10px;text-decoration:none;color:#111;font-size:15px;font-weight:650}.menu-dropdown a:hover,.menu-dropdown a:focus{background:rgba(250,235,200,.60);outline:none}
    .route-brand{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;color:#000;padding-top:4px;padding-left:72px;padding-right:72px}
    .route-brand img{width:86px;height:86px;object-fit:contain;display:block}.route-title{margin-top:2px}.route-title h1{margin:0;font-weight:800;color:#000;line-height:1.1;font-size:clamp(15px,4.2vw,19px)}.title-line{display:block;white-space:nowrap}.route-date{margin-top:3px;font-size:clamp(12px,3.4vw,15px);font-weight:400;color:#000;white-space:nowrap}
    #map{height:calc(100vh - var(--trackerHeaderH));width:100%}
    .panel{position:fixed;left:10px;right:10px;bottom:calc(10px + var(--safeBottom));z-index:1100;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:0 16px 44px rgba(0,0,0,.55);overflow:hidden;padding:12px;max-height:34vh;overflow:auto}
    .panel h2{font-size:16px;margin:0 0 4px}.panel p{margin:4px 0;color:var(--muted);font-size:13px;line-height:1.35}.panel strong{color:var(--text)}
    .history{margin-top:10px;border-top:1px solid rgba(255,255,255,.12);padding-top:8px}.history-title{font-weight:800;font-size:13px;margin-bottom:6px}.history-list{display:grid;gap:6px}.history-row{appearance:none;width:100%;text-align:left;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--text);border-radius:12px;padding:8px;cursor:pointer}.history-row small{display:block;color:var(--muted);margin-top:2px}
    .baton-icon{font-size:28px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.75))}.leaflet-popup-content-wrapper{border-radius:14px}.leaflet-popup-content{font-size:13px}
    @media (max-width:420px){:root{--trackerHeaderH:126px}.route-brand{padding-left:62px;padding-right:62px}.route-brand img{width:80px;height:80px}.menu-wrap{top:calc(50% - 20px)}.panel{max-height:36vh}}
  </style>
</head>
<body>
  <header class="topbar" id="topbar">
    <div class="topbar-row">
      <div class="menu-wrap">
        <button class="menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="site-menu" id="menuBtn" title="Menu">
          <img src="menu.svg" alt="" width="22" height="22" aria-hidden="true" />
          <span class="sr-only">Open menu</span>
        </button>
        <nav class="menu-dropdown" id="site-menu" aria-label="Site menu">
          <a href="index.html">Home</a>
          <a href="challenge.html">The Challenge</a>
          <a href="amy.html">About Amy</a>
          <a href="route.html">The Route</a>
          <a href="tracker.html">Baton Tracker</a>
          <a href="signup.html">Sign Up</a>
          <a href="signup-status.html">Confirmed Teams</a>
          <a href="charities.html">Fundraising</a>
          <a href="gallery.html">Gallery</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
      <div class="route-brand">
        <a href="index.html" aria-label="Home" style="display:inline-block"><img src="BMAlogo.svg" alt="Be More Amy logo" /></a>
        <div class="route-title"><h1><span class="title-line">Virtual Baton Tracker</span><span class="title-line">SWCP Relay Challenge</span></h1></div>
        <div class="route-date">16th May to 23rd May 2026</div>
      </div>
    </div>
  </header>

  <div id="map" aria-label="Baton tracker map"></div>

  <section class="panel" aria-live="polite">
    <h2 id="trackerTitle">Baton tracker</h2>
    <p id="trackerStatus">Loading baton position…</p>
    <p id="trackerSubStatus"></p>
    <div class="history">
      <div class="history-title">Leg history so far</div>
      <div id="historyList" class="history-list"><p>No updates yet.</p></div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="tracker.js"></script>
  <script>
    const menuBtn=document.getElementById('menuBtn');const menu=document.getElementById('site-menu');
    if(menuBtn&&menu){menuBtn.addEventListener('click',()=>{const open=menu.classList.toggle('open');menuBtn.setAttribute('aria-expanded',open?'true':'false')});document.addEventListener('click',e=>{if(!menu.contains(e.target)&&!menuBtn.contains(e.target)){menu.classList.remove('open');menuBtn.setAttribute('aria-expanded','false')}})}
  </script>
</body>
</html>
