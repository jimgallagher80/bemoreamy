<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>50x50 Random Grid</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(50, 1fr);
      grid-template-rows: repeat(50, 1fr);
      width: 95vmin;
      height: 95vmin;
      background: #222;
    }

    .cell {
      background: white;
    }
  </style>
</head>
<body>
  <div id="grid"></div>

  <script>
    const grid = document.getElementById('grid');
    const size = 50;
    const totalCells = size * size;
    const cells = [];

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      grid.appendChild(cell);
      cells.push(cell);
    }

    function updateGrid() {
      for (let i = 0; i < totalCells; i++) {
        cells[i].style.backgroundColor = Math.random() < 0.5 ? 'black' : 'white';
      }
    }

    updateGrid();
    setInterval(updateGrid, 1000);
  </script>
</body>
</html>
