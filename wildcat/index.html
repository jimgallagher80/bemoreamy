<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>Wildcat Hop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="rotateOverlay" class="overlay hidden">
      <div class="overlay-card tiny-card">
        <div class="rotate-icon">📱↻</div>
        <h1>Rotate device</h1>
        <p>Play in landscape.</p>
      </div>
    </div>

    <section id="startScreen" class="screen">
      <div class="menu-card tiny-card">
        <div class="title-row">
          <img class="title-art" src="gamegraphics/BMAlogo.svg" alt="Be More Amy logo" />
          <div class="title-text-block">
            <h1 class="game-title">WILDCAT<br />HOP</h1>
          </div>
          <img class="title-art" src="gamegraphics/wildcat-heli.svg" alt="Wildcat helicopter" />
        </div>

        <p class="subtitle">Tap to fly. Land to refuel.</p>

        <div class="controls-row">
          <div>Phone/tablet: tap</div>
          <div>Computer: space bar</div>
        </div>

        <button id="playBtn" class="btn btn-primary" type="button">Play</button>

        <div class="mini-scores">
          <div class="mini-box">
            <div class="mini-label">Best</div>
            <div id="personalBest" class="mini-value">0</div>
          </div>
        </div>
      </div>
    </section>

    <section id="gameUi" class="hidden">
      <div id="hud">
        <div class="hud-stack">
          <div class="fuel-panel">
            <div class="hud-label">Fuel</div>
            <div class="fuel-vertical">
              <div id="fuelFill" class="fuel-fill-vertical"></div>
            </div>
          </div>

          <div class="hud-pill hidden">
            <span class="hud-label">Distance</span>
            <span id="distanceValue" class="hud-value">0 m</span>
          </div>

          <div class="hud-pill">
            <span class="hud-label">Score</span>
            <span id="scoreValue" class="hud-value">0</span>
          </div>
        </div>
      </div>

      <div id="gameShell">
        <canvas id="gameCanvas" aria-label="Wildcat Hop game"></canvas>
      </div>
    </section>

    <section id="gameOverScreen" class="screen hidden">
      <div class="menu-card tiny-card">
        <div class="gameover-header">
          <img class="gameover-logo" src="gamegraphics/BMAlogo.svg" alt="Be More Amy logo" />
          <h1>Game Over</h1>
        </div>

        <div class="results-grid results-grid-two">
          <div class="result-card">
            <div class="result-label">Score</div>
            <div id="finalScore" class="result-value">0</div>
          </div>
          <div class="result-card">
            <div class="result-label">Landings</div>
            <div id="finalLandings" class="result-value">0</div>
          </div>
        </div>

        <div id="newPersonalBest" class="notice hidden">New personal best</div>

        <div class="button-row">
          <button id="playAgainBtn" class="btn btn-primary" type="button">Play Again</button>
          <button id="shareBtn" class="btn btn-secondary" type="button">Share</button>
        </div>

        <div class="button-row donate-row">
          <a
            id="donateBtn"
            class="btn btn-primary btn-donate"
            href="https://www.justgiving.com/team/bemoreamy"
            target="_blank"
            rel="noopener noreferrer"
          >
            Donate to Be More Amy
          </a>

          <a
            id="relayBtn"
            class="btn btn-secondary btn-donate"
            href="https://www.bemoreamy.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            SW Coast Relay
          </a>
        </div>

        <div class="hidden-meta">
          <span id="finalDistance">0 m</span>
          <span id="finalLandingQuality">None</span>
        </div>
      </div>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
